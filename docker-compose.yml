# ============================================================
# Dolibarr Modern Frontend — Docker Compose
#
# USO:
#   1. Copia .env.docker a .env.docker y edita DOLIBARR_BASE_URL y DOLIBARR_API_KEY
#   2. docker compose up -d --build
#   3. Abre http://localhost:8080
#
# Para producción detrás de un reverse proxy (Nginx, Traefik, Plesk):
#   Cambia el puerto o usa el bloque "networks" externo de tu proxy.
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dolibarr-modern-frontend:latest
    container_name: dolibarr-modern-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:80"
    env_file:
      - .env.docker
    volumes:
      # Datos persistentes en volúmenes Docker (no bind mounts — mejor en Windows/Linux)
      - sessions:/var/www/html/storage/framework/sessions
      - cache_data:/var/www/html/storage/framework/cache
      - views_cache:/var/www/html/storage/framework/views
      - logs:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  sessions:
  cache_data:
  views_cache:
  logs:
  bootstrap_cache:
